<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDoc AI | Premium Academic Suite</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header-title {
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .form-label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .input-group-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .input-group-custom:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .input-group-custom input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            margin-left: 10px;
        }
        /* Custom styling for the File Upload Button */
input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.3s ease;
    margin-right: 15px;
}

input[type="file"]::file-selector-button:hover {
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
}

/* For the Input/Output small file inputs */
.form-control-sm::file-selector-button {
    padding: 4px 10px;
    margin-right: 8px;
    background: rgba(0, 0, 0, 0.3);
}

/* Styling the 'No file chosen' text */
input[type="file"] {
    color: #94a3b8; /* Subtle grey text */
    font-size: 0.85rem;
}

        .btn-gen {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .btn-gen:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* Professional Loader */
        #loadingState {
            display: none;
            text-align: center;
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; background: var(--secondary); }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to { transform: translateY(-15px); opacity: 0.3; }
        }

        .step-msg {
            font-size: 0.85rem;
            color: #94a3b8;
            font-style: italic;
        }

        .file-info {
            font-size: 0.75rem;
            color: #6366f1;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="blob" style="top: -100px; left: -100px;"></div>
<div class="blob" style="bottom: -100px; right: -100px; animation-delay: -5s;"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            
            <div class="main-card">
                <div class="text-center mb-5">
                    <div class="mb-3">
                        <i class="fas fa-microchip fa-3x" style="color: var(--primary);"></i>
                    </div>
                    <h1 class="header-title">ProDoc AI</h1>
                    <p class="text-secondary fw-600">Premium Project Report Suite</p>
                </div>

                <form id="genForm" action="/generate" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label text-uppercase">Project Topic</label>
                        <div class="input-group-custom">
                            <i class="fas fa-lightbulb text-primary"></i>
                            <input type="text" name="project_title" placeholder="Enter Full Project Title" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-uppercase">Student Name</label>
                        <div class="input-group-custom">
                            <i class="fas fa-user-graduate text-primary"></i>
                            <input type="text" name="student_name" placeholder="Author Name" required>
                        </div>
                    </div>

                    <div class="mb-4">
    <label class="form-label text-uppercase">GitHub Repository URL</label>
    <div class="input-group-custom">
        <i class="fab fa-github text-primary"></i>
        <input type="text" name="github_url" placeholder="https://github.com/user/repo">
    </div>
    <div class="text-center mt-2">
        <span class="badge bg-glass text-muted" style="font-size: 0.65rem;">OR UPLOAD ZIP BELOW</span>
    </div>
</div>

<div class="mb-4">
    <label class="form-label text-uppercase">Source Code (ZIP)</label>
    <div class="input-group-custom">
        <i class="fas fa-file-code text-primary"></i>
        <input type="file" name="file" accept=".zip">
    </div>
</div>

                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label text-uppercase">Input Images</label>
                            <input type="file" name="input_img1" class="form-control form-control-sm mb-1 bg-dark text-white border-0" accept="image/*">
                            <input type="file" name="input_img2" class="form-control form-control-sm mb-1 bg-dark text-white border-0" accept="image/*">
                            <input type="file" name="input_img3" class="form-control form-control-sm bg-dark text-white border-0" accept="image/*">
                        </div>
                        <div class="col-6">
                            <label class="form-label text-uppercase">Output Images</label>
                            <input type="file" name="output_img1" class="form-control form-control-sm mb-1 bg-dark text-white border-0" accept="image/*">
                            <input type="file" name="output_img2" class="form-control form-control-sm mb-1 bg-dark text-white border-0" accept="image/*">
                            <input type="file" name="output_img3" class="form-control form-control-sm bg-dark text-white border-0" accept="image/*">
                        </div>
                    </div>

                    <button type="submit" class="btn-gen" id="submitBtn">
                        Build Documentation <i class="fas fa-bolt ms-2"></i>
                    </button>
                </form>

                <!-- Premium Loading State -->
                <div id="loadingState">
                    <div class="loader-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <h5 class="fw-bold mb-2">Architecting Document...</h5>
                    <p class="step-msg" id="dynamicText">AI is analyzing your code structure...</p>
                    <div class="progress mt-3 bg-dark" style="height: 6px; border-radius: 10px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" id="progressBar" style="width: 5%"></div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <small class="text-muted" style="font-size: 0.7rem;">
                        GENERATE 45+ PAGES IN SECONDS • AI POWERED BY GROQ & GEMINI
                    </small>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const form = document.getElementById('genForm');
    const loading = document.getElementById('loadingState');
    const dynamicText = document.getElementById('dynamicText');
    const progressBar = document.getElementById('progressBar');

    const steps = [
        "Analyzing project ZIP structure...",
        "Groq AI is writing abstract and intro...",
        "Generating professional system design...",
        "Architecting Data Flow Diagrams...",
        "Gemini is rendering Use Case logic...",
        "Developing module descriptions...",
        "Injecting sample coding pages...",
        "Finalizing document borders and layout..."
    ];

    form.onsubmit = function() {
        form.style.display = 'none';
        loading.style.display = 'block';

        let count = 0;
        let progress = 5;
        const interval = setInterval(() => {
            if(count < steps.length) {
                dynamicText.innerText = steps[count];
                progress += 10;
                progressBar.style.width = progress + "%";
                count++;
            } else {
                dynamicText.innerText = "Almost done! Saving your report...";
                progressBar.style.width = "95%";
            }
        }, 12000); // Wait time for 40+ pages
    };
</script>

</body>
</html>
